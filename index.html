<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>151K줄 교재</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard Variable', -apple-system, sans-serif;
      background: #06060c;
      color: #e0e0e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .gate {
      text-align: center;
      padding: 40px;
      max-width: 360px;
      width: 100%;
    }
    .gate-number {
      font-size: 2.5rem;
      font-weight: 900;
      color: #FF6B6B;
      letter-spacing: -0.04em;
      text-shadow: 0 0 40px rgba(255, 107, 107, 0.3);
      margin-bottom: 8px;
    }
    .gate p {
      font-size: 0.85rem;
      color: #505068;
      margin-bottom: 32px;
    }
    .gate-input {
      width: 100%;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #e0e0e8;
      font-size: 1.1rem;
      font-family: inherit;
      text-align: center;
      letter-spacing: 0.15em;
      outline: none;
      transition: border-color 0.2s;
    }
    .gate-input:focus {
      border-color: rgba(255, 107, 107, 0.4);
    }
    .gate-input::placeholder {
      color: #383848;
      letter-spacing: 0.05em;
    }
    .gate-btn {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.2);
      border-radius: 12px;
      color: #FF6B6B;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .gate-btn:hover {
      background: rgba(255, 107, 107, 0.15);
      border-color: rgba(255, 107, 107, 0.4);
    }
    .gate-error {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #FF6B6B;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .gate-error.show { opacity: 1; }
    .gate-hint {
      margin-top: 24px;
      font-size: 0.7rem;
      color: #2a2a3a;
    }
  </style>
</head>
<body>

<div class="gate">
  <div class="gate-number">151,000</div>
  <p>Bobby &times; Claude</p>
  <form id="gate-form">
    <input class="gate-input" type="password" id="pw" placeholder="access code" autocomplete="off" autofocus>
    <button class="gate-btn" type="submit">열기</button>
  </form>
  <div class="gate-error" id="err">비밀번호가 틀렸어</div>
</div>

<script>
(function() {
  // 이미 인증됐으면 바로 이동
  if (sessionStorage.getItem('auth') === 'ok') {
    location.replace('hub.html');
    return;
  }

  document.getElementById('gate-form').addEventListener('submit', function(e) {
    e.preventDefault();
    if (document.getElementById('pw').value === '151000') {
      sessionStorage.setItem('auth', 'ok');
      location.replace('hub.html');
    } else {
      document.getElementById('err').classList.add('show');
      document.getElementById('pw').value = '';
      setTimeout(function() {
        document.getElementById('err').classList.remove('show');
      }, 2000);
    }
  });
})();
</script>

</body>
</html>
